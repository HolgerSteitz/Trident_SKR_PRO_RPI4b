[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
    _Z_TILT_ADJUST horizontal_move_z=8 retry_tolerance=1
    {% endif %}
    _Z_TILT_ADJUST horizontal_move_z=2
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT

[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - PLEASE CUSTOMISE THE SCRIPT
#gcode:
    #[gcode_macro START_PRINT]
gcode:
    SET_FAN_SPEED FAN=EBB_fan SPEED=1
    SET_PIN PIN=daylight_pin VALUE=35.00
    {% set BED_TEMP = params.BED_TEMP|default(110)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(170)|float %}
    # Heat bed for probing
    #M190 S{BED_TEMP}
    # Use absolute coordinates
    G90
    M83
    BED_MESH_CLEAR
    STATUS_HEATING
    M140 S{BED_TEMP} ; Start bed heating
    M109 S170 ; Set nozzle to 190C for Tap/Probe and wait
    STATUS_HOMING
       G28 ; Home all axes
     _CLEAN_NOZZLE_GANTRY
    # Home the printer
    STATUS_LEVELING
    Z_TILT_ADJUST
    
    G28
    _CLEAN_NOZZLE_GANTRY
    G1 Z10
    G1 X175
    G1 Y175
    PROBE_EDDY_NG_TAP MODE=butter
    
    # If you are generating a new bed mesh:
    STATUS_MESHING
    BED_MESH_CALIBRATE METHOD=rapid_scan
    _CLEAN_NOZZLE_GANTRY
    ## NOTE:    The adaptive meshing feature requires exclude_object     ##
    ##      and may require 'Label Objects' to be enabled in the slicer  ##
    ##           To mesh without it just use BED_MESH_CALIBRATE          ##

    # If you are loading an existing mesh:
    #BED_MESH_PROFILE LOAD=default

    # Move the nozzle near the bed
    
    # Set and wait for nozzle to reach printing temperature
    #STATUS_HEATING
    M109 S{EXTRUDER_TEMP}
    STATUS_PRINTING
    
    #SFS_ENABLE #Aktiviere Smart Filament Sensor
    #PRIME_LINE
    G1 Z2.0 F3000 ; Move Z Axis up
    G1 X30 Y20 Z0.3 F5000.0 ; Move to start position
    G1 X30 Y200.0 Z0.3 F1500.0 E15 ; Draw the first line
    G92 E0 ; Reset Extruder
    # Start printing!
  
  
   # G1 Z40.0 F600 ;move the platform down 40mm
   # M109 S{EXTRUDER_TEMP}
   # G1 X165 Y25 F3000
   # G92 E0 ;zero the extruded length again
   # G1 F9000
   # M117 Printing...
   
