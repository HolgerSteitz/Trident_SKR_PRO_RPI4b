[stepper_z]
step_pin: PE14
dir_pin: PA0
enable_pin: !PC3
microsteps: 16
rotation_distance: 8.004802881729038
endstop_pin: probe:z_virtual_endstop #!PG8
#position_endstop: 0.5
position_max: 360
position_min: -10

[stepper_z1]
step_pin: PD15
dir_pin: PE7
enable_pin: !PA3
microsteps: 16
rotation_distance: 8.004802881729038
#endstop_pin: !PG8
#position_endstop: 0.5
#position_max: 200

[stepper_z2]
step_pin: PD13
dir_pin: PG9
enable_pin: !PF0
microsteps: 16
rotation_distance: 8.004802881729038
#endstop_pin: !PG8
#position_endstop: 0.5
#position_max: 200

