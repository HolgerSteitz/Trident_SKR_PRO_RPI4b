#heater_temp: 50.0
##  If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PD12
kick_start_time: 0.5
fan_speed: 0.4
heater: extruder

[controller_fan controller_fan2]
##  Controller fan - FAN3
pin: PD13
kick_start_time: 0.5
