[tmc2130 stepper_z]
cs_pin: PB3
spi_bus: spi3a
#diag1_pin: PG8
run_current: 0.650
stealthchop_threshold: 0 #999999

[tmc2130 stepper_z1]
cs_pin: PG15
spi_bus: spi3a
#diag1_pin: PG8
