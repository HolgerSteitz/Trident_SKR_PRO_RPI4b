# This file contains common pin mappings for the BigTreeTech SKR PRO.
# To use this config, the firmware should be compiled for the
# STM32F407 with a "32KiB bootloader".
# The "make flash" command does not work on the SKR PRO. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR PRO
# with that SD card.

# See docs/Config_Reference.md for a description of parameters. test!
[include mainsail.cfg]
[include Macros.cfg]
#[include PIS.cfg] #For accelaration probe
[include ebb2209can.cfg]
[include eddy-ng.cfg]
[virtual_sdcard]
path: ~/printer_data/gcodes
#[include stealthburner_leds.cfg]
[include barf.cfg]
[display_status]
[pause_resume]

[exclude_object]


[printer]
kinematics: corexy
max_velocity: 300 #200
max_accel: 5000 #1000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[mcu] #Afterburner Toolhead
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_45004A0009504B304B333620-if00
#[mcu]
#canbus_uuid: 718bca8d3eb3

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

#[temperature_sensor mcu_temp]
#sensor_type: temperature_mcu
#min_temp: 0
#max_temp: 100

[input_shaper]
#shaper_freq_x: 64.2
#shaper_type_x: mzv
#shaper_freq_y: 43
#shaper_type_y: mzv


[gcode_arcs]
resolution: 1.0

#####################################################################
#  Daylight on a Stick
#####################################################################
[output_pin daylight_pin]
pin: PD14 # Replace with your specific board pin (e.g., PA13 for Octopus HE1)
pwm: True
value: 1.0 # Initial state: 1.0 = on, 0.0 = off
shutdown_value: 0.0
cycle_time: 0.010 # 10ms (100Hz PWM)
scale: 100 # Allows setting brightness from 0-100

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PE9
dir_pin: !PF1
enable_pin: !PF2
microsteps: 16
rotation_distance: 39.820806
endstop_pin: PB10
position_endstop: 350
position_max: 350
position_min: 0
homing_speed: 50

[stepper_y]
step_pin: PE11
dir_pin: !PE8
enable_pin: !PD7
microsteps: 16
rotation_distance: 39.820806
endstop_pin: PE12
position_endstop: 350
position_max: 350
homing_speed: 50

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 16
gear_ratio: 50:10
rotation_distance: 21.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan:gpio27
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300

