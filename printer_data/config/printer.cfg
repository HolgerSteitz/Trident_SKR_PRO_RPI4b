# This file contains common pin mappings for the BigTreeTech SKR PRO.
# To use this config, the firmware should be compiled for the
# STM32F407 with a "32KiB bootloader".

# The "make flash" command does not work on the SKR PRO. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR PRO
# with that SD card.

# See docs/Config_Reference.md for a description of parameters. test!
[include mainsail.cfg]
[include Macros.cfg]
#[include PIS.cfg] #For accelaration probe


[virtual_sdcard]
path: ~/printer_data/gcodes
[display_status]
[pause_resume]

[exclude_object]


[printer]
kinematics: corexy
max_velocity: 300 #200
max_accel: 5000 #1000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_45004A0009504B304B333620-if00

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[input_shaper]
shaper_freq_x: 64.2
shaper_type_x: mzv
shaper_freq_y: 43
shaper_type_y: mzv


[gcode_arcs]
resolution: 1.0


#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PE9
dir_pin: !PF1
enable_pin: !PF2
microsteps: 16
rotation_distance: 39.820806
endstop_pin: PB10
position_endstop: 350
position_max: 350
position_min: 0
homing_speed: 50

[stepper_y]
step_pin: PE11
dir_pin: !PE8
enable_pin: !PD7
microsteps: 16
rotation_distance: 39.820806
endstop_pin: PE12
position_endstop: 350
position_max: 350
homing_speed: 50

[extruder]
step_pin: PE13
dir_pin: !PC2
enable_pin: !PC0
microsteps: 16
# Default for Bondtech 5mm Bore Drive Gears
rotation_distance: 22.6789511 #34.04255
gear_ratio: 50:17
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 1 # 0.400
filament_diameter: 1.750
pressure_advance_smooth_time: 0.040
heater_pin: PD12
sensor_pin:  PF4 # T1 Header
sensor_type: Generic 3950 # EPCOS 100K B57560G104F
control: pid
pid_kp = 26.656
pid_ki = 1.676
pid_kd = 105.959
min_temp: 10
min_extrude_temp: 10 #165
max_temp: 270
#Set appropriate once tuning your printer
#pressure_advance: .05 #0.67
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 200.0

[stepper_z]
step_pin: PE14
dir_pin: PA0
enable_pin: !PC3
microsteps: 16
rotation_distance: 8.004802881729038
endstop_pin: probe:z_virtual_endstop #!PG8
#position_endstop: 0.5
position_max: 360
position_min: -10

[stepper_z1]
step_pin: PD15
dir_pin: PE7
enable_pin: !PA3
microsteps: 16
rotation_distance: 8.004802881729038
#endstop_pin: !PG8
#position_endstop: 0.5
#position_max: 200

[stepper_z2]
step_pin: PD13
dir_pin: PG9
enable_pin: !PF0
microsteps: 16
rotation_distance: 8.004802881729038
#endstop_pin: !PG8
#position_endstop: 0.5
#position_max: 200

# vorher1.3
[probe]
pin: PG8
x_offset: 0
y_offset: 25.0
#z_offset = 0.75
speed: 10.0
samples: 1
samples_result: average
sample_retract_dist: 2.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

[homing_heaters]
heaters: extruder, heater_bed
#   A comma separated list of heaters to disable during homing/probing
#   moves. The default is to disable all heaters.

[safe_z_home]
home_xy_position: 180, 160 #200, 310 #160
speed: 50
z_hop: 15
z_hop_speed: 5

[z_tilt]
##	Use Z_TILT_ADJUST to level the bed left to right.
##	z_positions: Location of axis
z_positions:
   -51, 10
   175, 398
   401, 10
points:
   30, 30
   175, 300
   320, 30

speed: 200
horizontal_move_z: 10
retries: 10
retry_tolerance: 0.03

########################################
# Bed Meshing
########################################
#don’t run SAVE_CONFIG at the end of your BED_MESH_CALIBRATE, and run BED_MESH_CLEAR after running bed mesh
[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 310,310
fade_start: 0.6
fade_end: 10.0
probe_count: 10,10
algorithm: bicubic
#relative_reference_index: 12



[heater_bed]
heater_pin: PB1 # Heat0
sensor_pin: PF3 # T0
sensor_type: Generic 3950 #EPCOS 100K B57560G104F #ATC Semitec 104GT-2
min_temp: 0
max_temp: 130
max_power: 0.6
control = pid
pid_kp = 54.960
pid_ki = 1.918
pid_kd = 393.653

[verify_heater heater_bed]
# adjust for personal bed setup, this prevents stock heated bed from issuing
# false positive heating errors due to slow temperature increase
check_gain_time: 80 #600 in TronxyX5S Vorlage

[fan] #printCoolingFan
pin: PC8

[heater_fan fan_Heater]
pin: PE5
heater: extruder
heater_temp: 50.0

[controller_fan fan_controller]
pin: PE6
#max_power: 1.0
#kick_start_time: 0.5
#off_below: 0.13
#cycle_time: 0.010
#heater: extruder,heater_bed
idle_timeout: 60 


#######################################
#### Enclosure Temp Sensor Section ####
#######################################
[thermistor chamber_temp]
temperature1: 25
resistance1: 10000
beta: 3950


[temperature_sensor enclosure_temp]
sensor_type: chamber_temp
sensor_pin: PF5
min_temp: 0
max_temp: 100
gcode_id: C

#####################################################################
#    Filament Motion Sensor
#####################################################################

[filament_switch_sensor SFS_T0]
#detection_length: 10.00 ; This can be adjusted to your desired level of sensitivity. 10 is a recommended value to prevent flow dropoff false triggers.
#extruder: extruder
switch_pin: ^PA1 #PE4 #^PE15
pause_on_runout: FALSE #True ; This can be set to false to debug false positives putting the sensor in "monitor mode". The printer will not pause but it will run the runout_gcode below.
event_delay: 6.0
#pause_delay: 0.5
debounce_delay: 4.0
runout_gcode:
    M117 Runout Detected!
    PAUSE


########################################
# TMC2130 configuration
########################################

[tmc2130 stepper_x]
cs_pin: PA15
spi_bus: spi3a
#diag1_pin: PB10
run_current: 0.800
stealthchop_threshold: 0 #999999

[tmc2130 stepper_y]
cs_pin: PB8
spi_bus: spi3a
#diag1_pin: PE12
run_current: 0.800
stealthchop_threshold: 0 #999999

[tmc2130 extruder]
cs_pin: PB9
spi_bus: spi3a
#diag1_pin: PE15
run_current: 0.5 #0.800
#hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0 #999999

[tmc2130 stepper_z]
cs_pin: PB3
spi_bus: spi3a
#diag1_pin: PG8
run_current: 0.650
stealthchop_threshold: 0 #999999

[tmc2130 stepper_z1]
cs_pin: PG15
spi_bus: spi3a
#diag1_pin: PG8
run_current: 0.650
stealthchop_threshold: 0 #999999

[tmc2130 stepper_z2]
cs_pin: PG12
spi_bus: spi3a
#diag1_pin: PG8
run_current: 0.650
stealthchop_threshold: 0 #999999

