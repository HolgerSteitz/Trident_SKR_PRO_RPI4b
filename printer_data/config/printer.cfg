[homing_heaters]
heaters: extruder, heater_bed
#   A comma separated list of heaters to disable during homing/probing
#   moves. The default is to disable all heaters.

[safe_z_home]
home_xy_position: 175, 175 #200, 310 #160
speed: 50
z_hop: 15
z_hop_speed: 5

[z_tilt]
##	Use Z_TILT_ADJUST to level the bed left to right.
##	z_positions: Location of axis
z_positions:
   -51, 10
   175, 398
   401, 10
points:
   30, 30
   175, 300
   320, 30

speed: 200
horizontal_move_z: 2.0
retries: 15
retry_tolerance: 0.03

########################################
# Bed Meshing
########################################
#don’t run SAVE_CONFIG at the end of your BED_MESH_CALIBRATE, and run BED_MESH_CLEAR after running bed mesh
#[bed_mesh]
#speed: 100
#horizontal_move_z: 10
#mesh_min: 25, 25 #40, 40
#mesh_max: 340, 294 #310, 310
#fade_start: 0.6
#fade_end: 10.0
#probe_count: 10,10
#algorithm: bicubic
#relative_reference_index: 12



[heater_bed]
heater_pin: PB1 # Heat0
sensor_pin: PF3 # T0
sensor_type: Generic 3950 #EPCOS 100K B57560G104F #ATC Semitec 104GT-2
min_temp: 0
max_temp: 130
max_power: 0.6
control = pid
pid_kp = 54.960
pid_ki = 1.918
pid_kd = 393.653

[verify_heater heater_bed]
# adjust for personal bed setup, this prevents stock heated bed from issuing
# false positive heating errors due to slow temperature increase
check_gain_time: 80 #600 in TronxyX5S Vorlage

#[fan] #printCoolingFan
#pin: PC8

#[heater_fan pi_fan]
#pin: PD14
#heater: extruder
#max_power: 1.0
#kick_start_time: 0.5


#[heater_fan fan_Heater]
#pin: PE5
#heater: extruder
#heater_temp: 50.0

#[controller_fan fan_controller]
#pin: PE6
#max_power: 1.0
#kick_start_time: 0.5
#off_below: 0.13
#cycle_time: 0.010
#heater: extruder,heater_bed
#idle_timeout: 60 

[temperature_fan electronics_fan]
pin: PE5                # Change to your actual fan pin
sensor_type: temperature_mcu
sensor_mcu: mcu         # Name of your MCU
min_temp: 0
max_temp: 100
target_temp: 35      # Fan starts working to reach this temp
control: watermark      # Simple on/off hysteresis
max_delta: 2.0          # Hysteresis range
max_speed: 1.0
min_speed: 0.0
shutdown_speed: 0.0
kick_start_time: 0.5


[temperature_fan rpi_fan]
pin: PE6
sensor_type: temperature_host # This represents the Raspberry Pi
sensor_path: /sys/class/thermal/thermal_zone0/temp
control: watermark
min_temp: -10
max_temp: 85
target_temp: 35
max_delta: 2.0
max_speed: 1.0
min_speed: 0.4
shutdown_speed: 0.0
kick_start_time: 0.5

[controller_fan driver_fan]
pin: PC8
#max_power: 1.0
#shutdown_speed: 0
#cycle_time: 0.010
#hardware_pwm: False
kick_start_time: 0.5
fan_speed: 0.8
idle_timeout: 60
#idle_speed: 0.0
stepper: stepper_x, stepper_y, stepper_z, extruder

[fan_generic EBB_fan]
pin: EBBCan:gpio6
max_power: 1.0
kick_start_time: 0.5
# off_below: 0.10

#######################################
#### Enclosure Temp Sensor Section ####
#######################################
#[thermistor chamber_temp]
#temperature1: 25
#resistance1: 10000
#beta: 3950
[temperature_sensor chamber]
sensor_type: Generic 3950 # Change to your sensor type
sensor_pin: PF6                #; Change to your pin
min_temp: 0
max_temp: 300
gcode_id: C

#[temperature_sensor enclosure_temp]
#sensor_type: chamber_temp
#sensor_pin: PF5
#min_temp: 0
#max_temp: 100
#gcode_id: C

#####################################################################
#    Filament Motion Sensor
#####################################################################

[filament_switch_sensor SFS_T0]
#detection_length: 10.00 ; This can be adjusted to your desired level of sensitivity. 10 is a recommended value to prevent flow dropoff false triggers.
#extruder: extruder
switch_pin: ^PA1 #PE4 #^PE15
pause_on_runout: FALSE #True ; This can be set to false to debug false positives putting the sensor in "monitor mode". The printer will not pause but it will run the runout_gcode below.
event_delay: 6.0
#pause_delay: 0.5
debounce_delay: 4.0
runout_gcode:
    M117 Runout Detected!
    PAUSE


